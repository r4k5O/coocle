name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow:
    name: Workflow Validation
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install actionlint
        run: |
          curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.8/actionlint_1.7.8_linux_amd64.tar.gz -o actionlint.tgz
          tar -xzf actionlint.tgz actionlint
          chmod +x actionlint
          sudo mv actionlint /usr/local/bin/actionlint

      - name: Lint GitHub Actions workflow
        run: actionlint

  config:
    name: Config Validation
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Render config and health route wiring
        run: |
          test -f render.yaml
          grep -F "healthCheckPath: /api/healthz" render.yaml
          grep -F "autoDeployTrigger: checksPass" render.yaml
          grep -F 'key: COOCLE_RESET_DATA_ON_START' render.yaml
          grep -F 'value: "0"' render.yaml
          grep -F '@app.get("/api/healthz")' backend/main.py
          grep -F 'def api_healthz' backend/main.py
          grep -F 'app.mount("/", StaticFiles' backend/main.py
          grep -F '<link rel="icon"' pages/index.html

  backend:
    name: Backend Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - workflow
      - config

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          USE_ASTRA: "false"
          COOCLE_START_CRAWLER: "0"
          COOCLE_PREWARM_ASTRA: "0"
          COOCLE_RESET_DATA_ON_START: "0"
        run: python -m unittest discover -s tests -p "test_*.py" -v

  frontend:
    name: Frontend Checks
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - workflow
      - config

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Check frontend syntax
        run: node --check app.js

      - name: Run frontend unit tests
        run: node --test tests/app.test.js

  smoke:
    name: App Smoke Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - workflow
      - config
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start app
        env:
          USE_ASTRA: "false"
          COOCLE_START_CRAWLER: "0"
          COOCLE_PREWARM_ASTRA: "0"
          COOCLE_RESET_DATA_ON_START: "0"
        run: |
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/healthz > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat uvicorn.log
          exit 1

      - name: Smoke check core routes
        run: |
          curl -fsS http://127.0.0.1:8000/api/healthz
          curl -fsS http://127.0.0.1:8000/api/stats
          curl -fsS http://127.0.0.1:8000/api/pages/overview
          curl -fsS http://127.0.0.1:8000/api/pages/live-count
          curl -fsSI http://127.0.0.1:8000/favicon.ico
          curl -fsS http://127.0.0.1:8000/pages/ > /dev/null

      - name: Print server log on failure
        if: failure()
        run: cat uvicorn.log

      - name: Stop app
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" || true
          fi
