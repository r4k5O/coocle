services:
  - type: web
    name: coocle
    runtime: python
    plan: free
    autoDeployTrigger: checksPass
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: USE_ASTRA
        value: "true"
      - key: COOCLE_PREWARM_ASTRA
        value: "0"
      - key: COOCLE_START_CRAWLER
        value: "1"
      - key: COOCLE_MAX_PAGES
        value: "0"
      - key: COOCLE_MAX_DEPTH
        value: "10"
      - key: COOCLE_SAME_HOST_ONLY
        value: "0"
      - key: COOCLE_RESET_DATA_ON_START
        value: "0"
      - key: COOCLE_RESTORE_PAGES_FROM_ASTRA
        value: "true"
      - key: COOCLE_RESET_DATA_STRICT
        value: "0"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_SENDER_EMAIL
        sync: false
      - key: SMTP_SENDER_NAME
        value: Coocle
